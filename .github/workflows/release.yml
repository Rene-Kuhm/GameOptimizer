name: Release Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish (example: v0.3.0)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python (for build/dev)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Python embeddable
        id: cache-python-embed
        uses: actions/cache@v4
        with:
          path: python-embeddable
          key: python-embeddable-3.11.9-amd64

      - name: Download Python embeddable if not cached
        if: steps.cache-python-embed.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://www.python.org/ftp/python/3.11.9/python-3.11.9-embed-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile python-embeddable.zip
          Expand-Archive -Path python-embeddable.zip -DestinationPath python-embeddable
          Remove-Item python-embeddable.zip

      - name: Install pip for embedded Python
        shell: pwsh
        run: |
          $pythonDir = Get-ChildItem -Path python-embeddable -Directory | Select-Object -First 1
          $pythonExe = Get-ChildItem -Path $pythonDir.FullName -Filter python*.exe | Select-Object -First 1
          
          $env:PATH = "$($pythonDir.FullName);$env:PATH"
          
          Invoke-WebRequest -Uri https://bootstrap.pypa.io/get-pip.py -OutFile "$($pythonDir.FullName)\get-pip.py"
          & $pythonExe.FullName "$($pythonDir.FullName)\get-pip.py"
          Remove-Item "$($pythonDir.FullName)\get-pip.py"

      - name: Install Node dependencies
        run: npm ci

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Validate syntax checks
        run: |
          node --check electron/main.js
          node --check electron/renderer.js
          python -m py_compile backend/app/*.py

      - name: Build Windows installers
        run: npm run dist:win

      - name: Resolve release tag
        id: resolve_tag
        shell: pwsh
        run: |
          $tagInput = "${{ github.event.inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tagInput)) {
            $tagInput = "${{ github.ref_name }}"
          }

          if ([string]::IsNullOrWhiteSpace($tagInput)) {
            throw "Tag is required. Provide workflow_dispatch input 'tag' or run from a v* tag push."
          }

          "tag=$tagInput" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          files: |
            release/*.exe
          fail_on_unmatched_files: true
