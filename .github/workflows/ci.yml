name: CI

on:
  push:
  pull_request:

jobs:
  lightweight-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Python syntax compile
        run: python -m py_compile backend/app/*.py

      - name: Node syntax check main
        run: node --check electron/main.js

      - name: Node syntax check renderer
        run: node --check electron/renderer.js

  windows-tests:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend test dependencies
        run: python -m pip install -r backend/requirements-dev.txt

      - name: Run backend tests
        run: python -m pytest backend/tests
